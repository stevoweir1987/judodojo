<body class="text-on-surface selection:bg-primary-container selection:text-on-primary-container">

                    </span>
</div>
</div>
<!-- Mastery Summary (Bento-style snippet) -->
<div class="grid grid-cols-2 gap-4 mt-8 w-full max-w-md">

</div>
</div>

<!-- Profile Sections Grid -->

<!-- Training Goals -->

<span class="text-body-lg font-body-lg">About Judohub</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</section>
<!-- Bottom Actions Section -->
<section class="flex flex-col gap-4">
<!-- Premium Banner Integration - Cleaned up background -->
<div class="relative h-24 rounded-2xl overflow-hidden group cursor-pointer bg-surface-container-high border border-primary/20">

</button>
<!-- ACTIVE TAB -->

</button>

<script>
        function toggleSection(id) {
            const content = document.getElementById(`${id}-content`);
            const chevron = document.getElementById(`${id}-chevron`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                chevron.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                chevron.style.transform = 'rotate(0deg)';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            // Training goals expanded by default
        });
    </script>
