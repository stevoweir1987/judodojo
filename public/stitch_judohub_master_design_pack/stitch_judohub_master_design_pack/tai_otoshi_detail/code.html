<script>
        // Simple micro-interaction for cards
        document.querySelectorAll('button.glass-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.borderColor = 'rgba(242, 202, 80, 0.3)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.borderColor = 'rgba(255, 255, 255, 0.05)';
            });
        });

        // Add active state to nav items (client-side simulation)
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(i => {
                    i.classList.remove('text-primary', 'dark:text-primary-fixed-dim', 'scale-110');
                    i.classList.add('text-on-secondary-fixed-variant', 'opacity-60');
                });
                item.classList.remove('text-on-secondary-fixed-variant', 'opacity-60');
                item.classList.add('text-primary', 'dark:text-primary-fixed-dim', 'scale-110');
            });
        });
    </script>
