<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#e5e2e1",
                    "on-primary-container": "#554300",
                    "inverse-primary": "#735c00",
                    "surface-variant": "#353534",
                    "surface-container-low": "#1c1b1b",
                    "surface-container-highest": "#353534",
                    "surface": "#131313",
                    "secondary-fixed-dim": "#c8c6c5",
                    "primary-container": "#d4af37",
                    "on-error-container": "#ffdad6",
                    "background": "#131313",
                    "on-tertiary-fixed-variant": "#474649",
                    "secondary-fixed": "#e5e2e1",
                    "secondary-container": "#474746",
                    "on-secondary-fixed": "#1c1b1b",
                    "on-primary": "#3c2f00",
                    "on-secondary-container": "#b7b5b4",
                    "error-container": "#93000a",
                    "on-secondary-fixed-variant": "#474746",
                    "inverse-surface": "#e5e2e1",
                    "surface-container-high": "#2a2a2a",
                    "on-background": "#e5e2e1",
                    "outline": "#99907c",
                    "secondary": "#c8c6c5",
                    "primary": "#f2ca50",
                    "surface-dim": "#131313",
                    "on-primary-fixed-variant": "#574500",
                    "primary-fixed-dim": "#e9c349",
                    "on-tertiary": "#303032",
                    "on-surface-variant": "#d0c5af",
                    "on-secondary": "#313030",
                    "tertiary-container": "#b4b2b4",
                    "surface-container": "#201f1f",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed": "#1b1b1d",
                    "surface-bright": "#3a3939",
                    "on-tertiary-container": "#454547",
                    "on-primary-fixed": "#241a00",
                    "primary-fixed": "#ffe088",
                    "tertiary": "#d0cdd0",
                    "surface-container-lowest": "#0e0e0e",
                    "tertiary-fixed-dim": "#c8c6c8",
                    "inverse-on-surface": "#313030",
                    "outline-variant": "#4d4635",
                    "surface-tint": "#e9c349",
                    "tertiary-fixed": "#e4e2e4",
                    "on-error": "#690005"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "max-width-desktop": "1200px",
                    "gutter": "16px",
                    "unit": "8px",
                    "touch-target-min": "48px",
                    "card-gap": "12px",
                    "container-padding": "24px"
            },
            "fontFamily": {
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "headline-xl": ["Plus Jakarta Sans"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "display-lg": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg-mobile": ["20px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "headline-xl": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(32, 31, 31, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .option-selected {
            border-color: #f2ca50 !important;
            background: rgba(242, 202, 80, 0.15) !important;
            box-shadow: 0 0 15px rgba(242, 202, 80, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0E0E0E;
            color: #e5e2e1;
        }
        .progress-step {
            height: 4px;
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }
        .progress-step.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background: #f2ca50;
        }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden antialiased">
<!-- Clean Background -->
<div class="fixed inset-0 z-0 bg-[#0E0E0E]">
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 via-transparent to-black/80 z-10"></div>
</div>
<!-- Onboarding Container -->
<main class="relative z-20 min-h-screen flex flex-col px-container-padding pb-12 pt-12 max-w-lg mx-auto">
<!-- Step Indicator / Progress Rings equivalent for Mobile -->
<div class="flex gap-2 mb-10 w-full px-1">
<div class="progress-step active"></div>
<div class="progress-step"></div>
<div class="progress-step"></div>
<div class="progress-step"></div>
</div>
<!-- Header Branding -->
<div class="mb-12 text-center">
<h1 class="text-primary font-headline-lg-mobile text-headline-lg-mobile tracking-[0.1em] mb-1 font-extrabold">JUDOHUB</h1>
<p class="text-on-surface-variant/70 font-label-md text-label-md uppercase tracking-[0.25em]">Fast. Focused. Personal.</p>
</div>
<!-- Content Canvas -->
<section class="flex-grow flex flex-col justify-center space-y-8">
<div class="space-y-3 text-center">
<h2 class="font-headline-xl text-headline-xl leading-tight text-on-surface">Your judo. Your journey.</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80 max-w-[280px] mx-auto">We'll help you train, understand and pass your grading.</p>
</div>
<!-- Training Goals Selection List -->
<div class="space-y-3" id="goals-container">
<button class="w-full flex items-center justify-between p-5 rounded-xl glass-panel text-left transition-all duration-300 hover:bg-surface-container-high border group" onclick="selectGoal(this)">
<span class="font-label-md text-label-md text-on-surface">Improve my judo</span>
<span class="material-symbols-outlined text-primary opacity-0 group-[.option-selected]:opacity-100 transition-opacity">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl glass-panel text-left transition-all duration-300 hover:bg-surface-container-high border group" onclick="selectGoal(this)">
<span class="font-label-md text-label-md text-on-surface">Pass my grading</span>
<span class="material-symbols-outlined text-primary opacity-0 group-[.option-selected]:opacity-100 transition-opacity">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl glass-panel text-left transition-all duration-300 hover:bg-surface-container-high border group" onclick="selectGoal(this)">
<span class="font-label-md text-label-md text-on-surface">Get competition ready</span>
<span class="material-symbols-outlined text-primary opacity-0 group-[.option-selected]:opacity-100 transition-opacity">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-xl glass-panel text-left transition-all duration-300 hover:bg-surface-container-high border group" onclick="selectGoal(this)">
<span class="font-label-md text-label-md text-on-surface">All of the above</span>
<span class="material-symbols-outlined text-primary opacity-0 group-[.option-selected]:opacity-100 transition-opacity">check_circle</span>
</button>
</div>
</section>
<!-- Bottom Navigation / Primary Action -->
<footer class="mt-8 pt-4 space-y-6">
<button class="w-full h-[56px] bg-primary text-on-primary font-bold text-label-md rounded-xl shadow-xl shadow-primary/10 active:scale-95 transition-all duration-200">
            Continue
        </button>
<p class="text-center font-label-md text-on-surface-variant/60">
            Already have an account? <span class="text-primary font-bold ml-1">Sign In</span>
</p>
</footer>
</main>
<!-- Aesthetic Ambient Glow - Cleaned up -->
<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-primary/5 blur-[100px] -z-10 rounded-full"></div>
<script>
    function selectGoal(element) {
        // Clear previous selections
        const buttons = document.querySelectorAll('#goals-container button');
        buttons.forEach(btn => btn.classList.remove('option-selected'));
        
        // Apply selection to clicked element
        element.classList.add('option-selected');
        
        // Haptic feel
        element.style.transform = 'scale(0.97)';
        setTimeout(() => {
            element.style.transform = 'scale(1)';
        }, 100);
    }
</script>
</body></html>
